<nav aria-label="Post navigation" class="post-navigation">
    {{ with .PrevInSection }}
    <div class="prev-post">
        <p>
            <a href="{{ .RelPermalink }}">
                &#8592;
                Anterior:
                {{ .Title | markdownify }}
            </a>
        </p>
        <p class="prev-post-date">
            {{ dateFormat (or .Site.Params.dateFormat "January 2, 2006") .Date}}
        </p>
    </div>
    {{ end }}

    {{ with .NextInSection }}
    <div class="next-post">
        <p>
            <a href="{{ .RelPermalink }}">
                Próximo:
                {{ .Title | markdownify }}
                &#8594;
            </a>
        </p>
            <p class="next-post-date">
                {{ dateFormat (or .Site.Params.dateFormat "January 2, 2006") .Date}}
            </p>
    </div>
    {{ end }}
</nav>
