<div class="wedding-alert alert-{{ .Get "type" | default "note" }}" style="padding: 1rem; margin: 1.5rem 0; border-left: 4px solid var(--accent-color); background: rgba(255,255,255,0.03); border-radius: 0 4px 4px 0; font-family: var(--font-family);">
    <div style="text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.1em; font-weight: 700; margin-bottom: 0.5rem; color: var(--accent-color);">
        {{ .Get "type" | default "Nota" | upper }}
    </div>
    <div style="font-size: 0.95rem; line-height: 1.5; opacity: 0.9;">
        {{ .Inner | markdownify }}
    </div>
</div>
