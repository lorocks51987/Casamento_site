<div class="gallery-grid" id="wedding-gallery">
  {{ .Inner }}
</div>

<!-- Lightbox with Caption, Navigation & Counter -->
<div id="wedding-lightbox" class="lightbox" role="dialog" aria-label="Visualizar foto">
  <span class="lightbox-close" aria-label="Fechar">&times;</span>
  <div class="lightbox-wrapper">
    <img class="lightbox-content" id="lightbox-img" alt="">
    <p class="lightbox-caption" id="lightbox-caption"></p>
    <div class="lightbox-nav">
      <button id="lightbox-prev" aria-label="Foto anterior">&#8592;</button>
      <span class="lightbox-counter" id="lightbox-counter"></span>
      <button id="lightbox-next" aria-label="Próxima foto">&#8594;</button>
    </div>
  </div>
</div>
